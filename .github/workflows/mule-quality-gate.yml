name: MuleSoft Quality Gate
on:
  pull_request:             # Trigger on the PR itself (Developer action)
    types: [opened, synchronize, reopened]
  pull_request_review:      # Trigger on the Copilot review
    types: [submitted]
  workflow_dispatch:        # Keep the manual "Run" button

jobs:
  enforce-mule-standards:
    # Only run if the review comes from the Copilot Bot
    # if: github.event.review.user.login == 'github-copilot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Extract and Validate Mule Review
        id: gate
        run: |
          # 1. Extract the JSON block from the review body
          REVIEW_BODY='${{ github.event.review.body }}'
          JSON_DATA=$(echo "$REVIEW_BODY" | sed -n '/```json/,/```/p' | sed '1d;$d')
          
          # 2. Parse values using jq
          OVERALL=$(echo "$JSON_DATA" | jq -r '.overallStatus')
          CRITICAL=$(echo "$JSON_DATA" | jq -r '.violationSummary.critical // 0')
          ERRORS=$(echo "$JSON_DATA" | jq -r '.violationSummary.error // 0')
          WARNINGS=$(echo "$JSON_DATA" | jq -r '.violationSummary.warning // 0')
          
          # 3. Apply your Section 5 Logic
          # CRITICAL_FAIL: critical > 0
          if [ "$CRITICAL" -gt 0 ]; then
            echo "STATUS=CRITICAL_FAIL" >> $GITHUB_OUTPUT
            echo "REASON=Hardblocked: $CRITICAL Critical violations found." >> $GITHUB_OUTPUT
            exit 1
          fi

          # NON_COMPLIANT: errors > 5
          if [ "$ERRORS" -gt 5 ]; then
            echo "STATUS=NON_COMPLIANT" >> $GITHUB_OUTPUT
            echo "REASON=Merge Blocked: $ERRORS errors exceeds the limit of 5." >> $GITHUB_OUTPUT
            exit 1
          fi

          # 4. Check Security Specifics (Custom logic for SEC001-003)
          # Note: This assumes Copilot labels security errors in the JSON or body
          SEC_ERRORS=$(echo "$REVIEW_BODY" | grep -o "SEC[0-9]\{3\}" | wc -l)
          if [ "$SEC_ERRORS" -ge 3 ]; then
            echo "STATUS=CRITICAL_FAIL" >> $GITHUB_OUTPUT
            echo "REASON=Security Failure: $SEC_ERRORS security issues detected." >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "STATUS=$OVERALL" >> $GITHUB_OUTPUT
          echo "REASON=Passed Mule Quality Gate with status $OVERALL." >> $GITHUB_OUTPUT

      - name: Post Results to PR
        if: always()
        run: |
          echo "### Mule Review Summary: ${{ steps.gate.outputs.STATUS }}" >> $GITHUB_STEP_SUMMARY
          echo "> ${{ steps.gate.outputs.REASON }}" >> $GITHUB_STEP_SUMMARY
