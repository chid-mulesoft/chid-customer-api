name: AI Mule Auditor
on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  full-audit:
    runs-on: ubuntu-latest
    permissions:
      checks: write      # Required to create the Check Run
      contents: read     # Required to scan source files
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Copilot CLI
        run: |
          npm install -g @github/copilot
          echo "$(npm config get prefix)/bin" >> $GITHUB_PATH

      - name: Execute Full Review
        id: auditor
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          # 1. Run in silent mode (-s) to remove decorative terminal boxes
          # --autopilot allows the agent to navigate the full repository
          # --allow-all prevents the agent from stopping for manual folder permissions
          RAW_OUTPUT=$(copilot -p "Perform a full repository audit of all Mule XML and DWL files based on .github/copilot-instructions.md. Output ONLY the JSON array of annotations." -s --autopilot --allow-all)

          # 2. Extract ONLY the JSON array (strips any leading/trailing AI chatter)
          CLEAN_JSON=$(echo "$RAW_OUTPUT" | sed -n '/\[/,/\]/p' | jq -c '.')

          # 3. Use Heredoc syntax to save multiline JSON to GITHUB_OUTPUT
          # We use a random delimiter to prevent conflicts with JSON content
          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "ANNOTATIONS<<$DELIMITER" >> $GITHUB_OUTPUT
          echo "$CLEAN_JSON" >> $GITHUB_OUTPUT
          echo "$DELIMITER" >> $GITHUB_OUTPUT

      - name: Publish Check Run
        uses: LouisBrunner/checks-action@v2.0.0
        if: always()
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "MuleSoft Compliance Audit"
          # Set conclusion to failure if JSON contains the word "failure"
          conclusion: ${{ contains(steps.auditor.outputs.ANNOTATIONS, 'failure') && 'failure' || 'success' }}
          output: |
            {
              "summary": "Full repository audit completed by Copilot CLI.",
              "annotations": ${{ steps.auditor.outputs.ANNOTATIONS }}
            }
