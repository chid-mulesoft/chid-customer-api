name: AI Mule Auditor
on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  full-audit:
    runs-on: ubuntu-latest
    permissions:
      checks: write      # Required to create the Check Run
      contents: read     # Required to scan source files
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Copilot CLI
        run: |
          npm install -g @github/copilot
          echo "$(npm config get prefix)/bin" >> $GITHUB_PATH

      - name: Execute Full Review
        id: auditor
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          # 1. Use --raw (or -r) to disable all terminal decorations and boxes
          # --autopilot allows the agent to navigate the repository autonomously
          # We redirect stderr to /dev/null to ensure only the AI response is captured
          RAW_OUTPUT=$(copilot -p "Perform a full repository audit based on .github/copilot-instructions.md. Output ONLY the raw JSON array." --raw --autopilot --allow-all 2>/dev/null)

          # 2. Extract JSON using a Python one-liner (more reliable than sed for nested brackets)
          # This finds the first '[' and last ']' and pulls everything in between
          CLEAN_JSON=$(echo "$RAW_OUTPUT" | python3 -c "import sys, json, re; m = re.search(r'\[.*\]', sys.stdin.read(), re.DOTALL); print(json.dumps(json.loads(m.group(0)))) if m else print('[]')")

          # 3. Use Heredoc syntax for multiline GITHUB_OUTPUT
          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64 | tr -dc 'a-zA-Z0-9')
          echo "ANNOTATIONS<<$DELIMITER" >> $GITHUB_OUTPUT
          echo "$CLEAN_JSON" >> $GITHUB_OUTPUT
          echo "$DELIMITER" >> $GITHUB_OUTPUT
