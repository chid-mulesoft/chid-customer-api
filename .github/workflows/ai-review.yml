name: AI Mule Auditor
on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  full-audit:
    runs-on: ubuntu-latest
    permissions:
      checks: write      # Required to create the Check Run
      contents: read     # Required to scan source files
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Copilot CLI
        run: |
          npm install -g @github/copilot
          echo "$(npm config get prefix)/bin" >> $GITHUB_PATH

      - name: Execute Full Review
        id: auditor
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          # 1. Run in silent mode (-s) to strip decorative terminal boxes
          # --autopilot allows the agent to navigate the repository tree
          RAW_OUTPUT=$(copilot -p "Full repository audit based on .github/copilot-instructions.md. Output ONLY a JSON array." -s --autopilot --allow-all)

          # 2. Extract JSON array. If none found, default to an empty array "[]"
          CLEAN_JSON=$(echo "$RAW_OUTPUT" | sed -n '/\[/,/\]/p' | jq -c '.' || echo "[]")
          if [ -z "$CLEAN_JSON" ] || [ "$CLEAN_JSON" == "null" ]; then
            CLEAN_JSON="[]"
          fi

          # 3. Use Heredoc syntax to safely handle multiline JSON in GITHUB_OUTPUT
          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "ANNOTATIONS<<$DELIMITER" >> $GITHUB_OUTPUT
          echo "$CLEAN_JSON" >> $GITHUB_OUTPUT
          echo "$DELIMITER" >> $GITHUB_OUTPUT

      - name: Publish Check Run
        uses: LouisBrunner/checks-action@v2.0.0
        if: always()
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "MuleSoft Compliance Audit"
          # Set conclusion to failure if any 'failure' annotations exist
          conclusion: ${{ contains(steps.auditor.outputs.ANNOTATIONS, 'failure') && 'failure' || 'success' }}
          # Use the | character to define the output as a valid JSON block
          output: |
            {
              "summary": "Full repository audit completed by Copilot CLI.",
              "annotations": ${{ steps.auditor.outputs.ANNOTATIONS || '[]' }}
            }
